name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/checkout@v6.0.2
        with:
          repository: TheAxiomFoundation/rulespec-us
          path: _axiom/rulespec-us
      - uses: actions/checkout@v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-rules-engine
          path: _axiom/axiom-rules-engine
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv python install 3.13
      - run: uv run --python 3.13 --extra dev ruff check src/ tests/
      - run: uv run --python 3.13 --extra dev ruff format --check src/ tests/
      - run: uv run --python 3.13 --extra dev --extra policyengine python -m pytest
        env:
          AXIOM_RULESPEC_US_ROOT: ${{ github.workspace }}/_axiom/rulespec-us
          AXIOM_RULES_ENGINE_ROOT: ${{ github.workspace }}/_axiom/axiom-rules-engine
