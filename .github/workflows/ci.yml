name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv python install 3.13
      - run: uv run --python 3.13 --extra dev ruff check src/ tests/
      - run: uv run --python 3.13 --extra dev ruff format --check src/ tests/
      - run: uv run --python 3.13 --extra dev python -m pytest
